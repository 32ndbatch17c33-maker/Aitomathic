<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Scoring Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-body: #0a0f0d;
            --bg-container: rgba(16, 26, 20, 0.95);
            --border-main: #2d7a43;
            --text-main: #e2f0e6;
            --text-title: #4ef07c;
            --bg-box: #121f16;
            --bg-input: #0a0f0d;
            --bg-btn: #141c17;
        }
        .light-theme {
            --bg-body: #f4f7f5;
            --bg-container: #ffffff;
            --border-main: #2d7a43;
            --text-main: #2c3e35;
            --text-title: #1e522d;
            --bg-box: #eaeaea;
            --bg-input: #ffffff;
            --bg-btn: #eef2f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
        }
        .theme-toggle-btn {
            align-self: flex-end;
            max-width: 650px;
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            background: var(--border-main);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .console-container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-container);
            border: 1px solid var(--border-main);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(45, 122, 67, 0.2);
        }
        h2 {
            color: var(--text-title);
            text-shadow: 0 0 10px rgba(78, 240, 124, 0.2);
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .profile-box {
            background: var(--bg-box);
            border: 1px dashed var(--border-main);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .profile-field h3 { color: var(--text-title); font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-main);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--text-title); }
        .tier-section {
            margin-bottom: 35px;
            border-top: 1px solid rgba(45, 122, 67, 0.3);
            padding-top: 20px;
        }
        .tier-header { font-size: 18px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
        .tier-easy { color: #a4f4b5; }
        .tier-avg { color: #f4d160; }
        .tier-diff { color: #ff6b6b; }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            gap: 10px;
        }
        .item-label { font-weight: 600; font-size: 15px; width: 60px; }
        .status-indicator {
            width: 18px; height: 18px; border-radius: 50%; display: inline-block; background-color: #24b353;
        }
        .btn-group { display: flex; gap: 8px; flex-grow: 1; justify-content: flex-end; align-items: center; }
        .state-btn {
            background: var(--bg-btn); border: 1px solid var(--border-main); color: var(--text-main);
            padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .btn-correct.active { background: #2d7a43 !important; color: #fff !important; }
        .btn-wrong.active { background: #ca3c3c !important; color: #fff !important; border-color: #ca3c3c; }
        .btn-none.active { background: #2b5cb8 !important; color: #fff !important; border-color: #2b5cb8; }
        .pdf-btn {
            width: 100%; background: linear-gradient(135deg, #2d7a43 0%, #1e522d 100%); color: white;
            border: none; padding: 15px; font-weight: 700; font-size: 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 15px;
        }
        .sync-status { text-align: center; font-size: 12px; color: #4ef07c; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 Switch Dark / Bright Theme</button>

    <div class="console-container">
        <h2>Quantum Scoring Engine</h2>
        
        <div class="profile-box">
            <div class="profile-field">
                <h3>Identity Settings</h3>
                <input type="text" id="teamNameInput" placeholder="Type Core Team Name (e.g. Cyber Knights)" onchange="updateTeamIdentity()">
            </div>
            <div class="profile-field">
                <h3>Scorer Name</h3>
                <input type="text" id="scorerNameInput" placeholder="Enter Scorer Name" onchange="pushStateToCloud()">
            </div>
        </div>

        <div class="tier-section">
            <div class="tier-header tier-easy">🟢 Easy Tier</div>
            <div id="easyContainer"></div>
        </div>

        <div class="tier-section">
            <div class="tier-header tier-avg">🟡 Average Tier</div>
            <div id="averageContainer"></div>
        </div>

        <div class="tier-section">
            <div class="tier-header tier-diff">🔴 Difficult Tier</div>
            <div id="difficultContainer"></div>
        </div>

        <button class="pdf-btn" onclick="generateReportPDF()">Generate Summary PDF</button>
        <div class="sync-status">⚡ Database automated live pipeline synchronization operational.</div>
    </div>

    <script>
        const DATABASE_URL = "https://lomhji-default-rtdb.asia-southeast1.firebasedatabase.app";
        let activeTeam = "";
        
        let currentRecord = {
            easy: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" },
            average: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" },
            difficult: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" }
        };

        const pointSchema = {
            easy: { correct: 2, wrong: -2, unanswered: 0, unscored: 0 },
            average: { correct: 10, wrong: -5, unanswered: -2, unscored: 0 },
            difficult: { correct: 25, wrong: -10, unanswered: -5, unscored: 0 }
        };

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function initMatrices() {
            renderTier("easy", document.getElementById("easyContainer"));
            renderTier("average", document.getElementById("averageContainer"));
            renderTier("difficult", document.getElementById("difficultContainer"));
        }

        function renderTier(tierKey, elementContainer) {
            let html = "";
            for(let i = 1; i <= 5; i++) {
                html += `
                    <div class="item-row">
                        <div class="item-label">Item 0${i}</div>
                        <div class="btn-group">
                            <span class="status-indicator" id="indicator-${tierKey}-item${i}"></span>
                            <button class="state-btn btn-correct" id="${tierKey}-i${i}-correct" onclick="selectState('${tierKey}', 'item${i}', 'correct')">Correct</button>
                            <button class="state-btn btn-wrong" id="${tierKey}-i${i}-wrong" onclick="selectState('${tierKey}', 'item${i}', 'wrong')">Wrong</button>
                            <button class="state-btn btn-none" id="${tierKey}-i${i}-unanswered" onclick="selectState('${tierKey}', 'item${i}', 'unanswered')">No Ans</button>
                        </div>
                    </div>`;
            }
            elementContainer.innerHTML = html;
        }

        async function updateTeamIdentity() {
            const rawName = document.getElementById("teamNameInput").value.trim();
            if(!rawName) return;
            activeTeam = rawName.replace(/[\.#\$\[\]]/g, "-");
            
            try {
                const response = await fetch(`${DATABASE_URL}/competition_teams/${activeTeam}.json`);
                const existingData = await response.json();
                if(existingData) {
                    if(existingData.matrix) currentRecord = existingData.matrix;
                    if(existingData.scorerName) document.getElementById("scorerNameInput").value = existingData.scorerName;
                    refreshButtonUIStates();
                } else {
                    currentRecord = {
                        easy: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" },
                        average: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" },
                        difficult: { item1: "unscored", item2: "unscored", item3: "unscored", item4: "unscored", item5: "unscored" }
                    };
                    refreshButtonUIStates();
                    pushStateToCloud();
                }
            } catch(e) { console.error(e); }
        }

        function selectState(tier, itemKey, selectionValue) {
            if(!activeTeam) {
                alert("ALERT: Please specify a Team Name first!");
                return;
            }
            currentRecord[tier][itemKey] = selectionValue;
            refreshButtonUIStates();
            pushStateToCloud();
        }

        function refreshButtonUIStates() {
            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const itemKey = `item${i}`;
                    const currentVal = currentRecord[tier][itemKey];
                    
                    document.getElementById(`${tier}-i${i}-correct`).classList.remove("active");
                    document.getElementById(`${tier}-i${i}-wrong`).classList.remove("active");
                    document.getElementById(`${tier}-i${i}-unanswered`).classList.remove("active");

                    const indicator = document.getElementById(`indicator-${tier}-${itemKey}`);
                    if(currentVal === "unscored") {
                        indicator.style.display = "inline-block";
                    } else {
                        indicator.style.display = "none";
                        const targetBtn = document.getElementById(`${tier}-i${i}-${currentVal}`);
                        if(targetBtn) targetBtn.classList.add("active");
                    }
                }
            });
        }

        function calculateMetricsTotal() {
            let score = 0;
            let breakdown = { easy: {c:0, w:0, n:0}, average: {c:0, w:0, n:0}, difficult: {c:0, w:0, n:0} };

            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const val = currentRecord[tier][`item${i}`];
                    score += pointSchema[tier][val];
                    if(val === 'correct') breakdown[tier].c++;
                    if(val === 'wrong') breakdown[tier].w++;
                    if(val === 'unanswered') breakdown[tier].n++;
                }
            });
            return { total: score, breakdown: breakdown };
        }

        async function pushStateToCloud() {
            if(!activeTeam) return;
            const metrics = calculateMetricsTotal();
            const payload = {
                teamName: document.getElementById("teamNameInput").value.trim(),
                scorerName: document.getElementById("scorerNameInput").value.trim() || "N/A",
                totalScore: metrics.total,
                breakdown: metrics.breakdown,
                matrix: currentRecord
            };
            await fetch(`${DATABASE_URL}/competition_teams/${activeTeam}.json`, {
                method: "PUT",
                body: JSON.stringify(payload)
            });
        }

        function generateReportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const name = document.getElementById("teamNameInput").value.trim() || "Unknown Team";
            const scorer = document.getElementById("scorerNameInput").value.trim() || "N/A";
            const metrics = calculateMetricsTotal();

            doc.setFont("Helvetica", "bold");
            doc.setFontSize(22);
            doc.text("COMPETITION PERFORMANCE SUMMARY", 20, 25);
            doc.line(20, 28, 190, 28);
            doc.setFontSize(14);
            doc.text(`Team Name: ${name}`, 20, 40);
            doc.text(`Scorer Officer: ${scorer}`, 20, 48);
            doc.text(`Aggregated Score: ${metrics.total} Points`, 20, 56);
            doc.save(`Performance_Report_${name.replace(/\s+/g, '_')}.pdf`);
        }

        initMatrices();
    </script>
</body>
</html>
