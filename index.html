<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMATHic 2027 Score Sheet App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px rgba(0, 255, 100, 0.4), 0 0 20px rgba(0, 255, 100, 0.2); }
            50% { text-shadow: 0 0 20px rgba(0, 255, 100, 0.8), 0 0 30px rgba(0, 255, 100, 0.4); }
            100% { text-shadow: 0 0 10px rgba(0, 255, 100, 0.4), 0 0 20px rgba(0, 255, 100, 0.2); }
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #0b0f12;
            color: #00ff64;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            background-image: linear-gradient(rgba(0, 255, 100, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 100, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .console-container {
            width: 100%;
            max-width: 680px;
            background: #11161b;
            border: 2px solid #00ff64;
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 100, 0.15);
            position: relative;
            overflow: hidden;
        }

        .console-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Cosmic Display Showcase */
        .celestial-showcase {
            width: 100%;
            height: 160px;
            background-color: #050709;
            background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            border: 1px solid #00ff64;
            margin-bottom: 25px;
            border-radius: 2px;
            position: relative;
        }

        .celestial-showcase::before {
            content: "SYSTEM LIVE ORIENTATION SCAN";
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: #11161b;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #00ff64;
        }

        h2 {
            color: #00ff64;
            animation: pulseGlow 3s infinite ease-in-out;
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #00ff64;
            padding-bottom: 15px;
        }
        
        .profile-box {
            background: #161f24;
            border: 1px solid #00ff64;
            padding: 20px;
            margin-bottom: 30px;
        }
        .profile-box h3 { color: #00ff64; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            background: #0b0f12;
            border: 1px solid #00ff64;
            color: #00ff64;
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(0, 255, 100, 0.4); }
        input::placeholder { color: rgba(0, 255, 100, 0.4); }

        .tier-section {
            margin-bottom: 35px;
            border: 1px solid #00ff64;
            background: #0d1216;
            padding: 20px 15px 10px 15px;
        }
        .tier-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed rgba(0, 255, 100, 0.4);
            padding-bottom: 5px;
        }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 255, 100, 0.02);
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 255, 100, 0.1);
        }
        .item-label { font-weight: bold; font-size: 15px; color: #00ff64; }
        
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .state-btn {
            background: #0b0f12;
            border: 1px solid rgba(0, 255, 100, 0.4);
            color: rgba(0, 255, 100, 0.7);
            padding: 6px 14px;
            font-family: "Times New Roman", Times, serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .state-btn:hover { background: rgba(0, 255, 100, 0.1); color: #00ff64; }
        
        .btn-correct.active { background: #00ff64 !important; color: #000000 !important; font-weight: bold; box-shadow: 0 0 10px rgba(0, 255, 100, 0.4); border-color: #00ff64; }
        .btn-wrong.active { background: #ff3333 !important; color: #ffffff !important; font-weight: bold; box-shadow: 0 0 10px rgba(255, 51, 51, 0.4); border-color: #ff3333; }
        .btn-none.active { background: #33a6ff !important; color: #ffffff !important; font-weight: bold; box-shadow: 0 0 10px rgba(51, 166, 255, 0.4); border-color: #33a6ff; }

        .pdf-btn {
            width: 100%;
            background: #00ff64;
            color: #000000;
            border: 2px solid #00ff64;
            padding: 15px;
            font-family: "Times New Roman", Times, serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .pdf-btn:hover { background: transparent; color: #00ff64; box-shadow: 0 0 15px rgba(0, 255, 100, 0.4); }
        .sync-status { text-align: center; font-size: 12px; color: #00ff64; margin-top: 12px; opacity: 0.8; font-style: italic; }
    </style>
</head>
<body>

    <div class="console-container">
        <h2>Welcome to AutoMATHic 2027 Score Sheet App</h2>
        
        <div class="celestial-showcase"></div>
        
        <div class="profile-box">
            <h3>Identity Core Verification</h3>
            <div class="input-row">
                <input type="text" id="teamNameInput" placeholder="Target Team Name Entry..." onchange="updateTeamIdentity()">
                <input type="text" id="scorerNameInput" placeholder="Examiner Signature Code..." onchange="pushStateToCloud()">
            </div>
        </div>

        <div class="tier-section">
            <div class="tier-header">🟢 Easy Tier Matrix Breakdown (+2 / -2 / 0)</div>
            <div id="easyContainer"></div>
        </div>

        <div class="tier-section">
            <div class="tier-header">🟡 Average Tier Matrix Breakdown (+10 / -5 / -2)</div>
            <div id="averageContainer"></div>
        </div>

        <div class="tier-section">
            <div class="tier-header">🔴 Difficult Tier Matrix Breakdown (+25 / -10 / -5)</div>
            <div id="difficultContainer"></div>
        </div>

        <button class="pdf-btn" onclick="generateReportPDF()">Print Professional Grade Report</button>
        <div class="sync-status">// Automated Node Uplink Matrix Operational and Synced.</div>
    </div>

    <script>
        const DATABASE_URL = "https://lomhji-default-rtdb.asia-southeast1.firebasedatabase.app";
        let activeTeam = "";
        
        let currentRecord = {
            easy: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" },
            average: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" },
            difficult: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" }
        };

        const pointSchema = {
            easy: { correct: 2, wrong: -2, unanswered: 0 },
            average: { correct: 10, wrong: -5, unanswered: -2 },
            difficult: { correct: 25, wrong: -10, unanswered: -5 }
        };

        function initMatrices() {
            renderTier("easy", document.getElementById("easyContainer"));
            renderTier("average", document.getElementById("averageContainer"));
            renderTier("difficult", document.getElementById("difficultContainer"));
        }

        function renderTier(tierKey, elementContainer) {
            let html = "";
            for(let i = 1; i <= 5; i++) {
                html += `
                    <div class="item-row">
                        <div class="item-label">Item 0${i}</div>
                        <div class="btn-group">
                            <button class="state-btn btn-correct" id="${tierKey}-i${i}-correct" onclick="selectState('${tierKey}', 'item${i}', 'correct')">Correct</button>
                            <button class="state-btn btn-wrong" id="${tierKey}-i${i}-wrong" onclick="selectState('${tierKey}', 'item${i}', 'wrong')">Wrong</button>
                            <button class="state-btn btn-none" id="${tierKey}-i${i}-unanswered" onclick="selectState('${tierKey}', 'item${i}', 'unanswered')">No Ans</button>
                        </div>
                    </div>`;
            }
            elementContainer.innerHTML = html;
        }

        async function updateTeamIdentity() {
            const rawName = document.getElementById("teamNameInput").value.trim();
            if(!rawName) return;
            activeTeam = rawName.replace(/[\.#\$\[\]]/g, "-");
            
            try {
                const response = await fetch(`${DATABASE_URL}/competition_teams/${activeTeam}.json`);
                const existingData = await response.json();
                if(existingData) {
                    if(existingData.matrix) currentRecord = existingData.matrix;
                    if(existingData.scorerName) document.getElementById("scorerNameInput").value = existingData.scorerName;
                    refreshButtonUIStates();
                } else {
                    currentRecord = {
                        easy: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" },
                        average: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" },
                        difficult: { item1: "unanswered", item2: "unanswered", item3: "unanswered", item4: "unanswered", item5: "unanswered" }
                    };
                    refreshButtonUIStates();
                    pushStateToCloud();
                }
            } catch(e) { console.error(e); }
        }

        function selectState(tier, itemKey, selectionValue) {
            if(!activeTeam) {
                alert("Please declare a Core Team Identity profile title first.");
                return;
            }
            currentRecord[tier][itemKey] = selectionValue;
            refreshButtonUIStates();
            pushStateToCloud();
        }

        function refreshButtonUIStates() {
            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const currentVal = currentRecord[tier][`item${i}`];
                    document.getElementById(`${tier}-i${i}-correct`).classList.remove("active");
                    document.getElementById(`${tier}-i${i}-wrong`).classList.remove("active");
                    document.getElementById(`${tier}-i${i}-unanswered`).classList.remove("active");

                    const targetBtn = document.getElementById(`${tier}-i${i}-${currentVal}`);
                    if(targetBtn) targetBtn.classList.add("active");
                }
            });
        }

        function calculateMetricsTotal() {
            let score = 0;
            let breakdown = { easy: {c:0, w:0, n:0}, average: {c:0, w:0, n:0}, difficult: {c:0, w:0, n:0} };

            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const val = currentRecord[tier][`item${i}`];
                    score += pointSchema[tier][val];
                    if(val === 'correct') breakdown[tier].c++;
                    if(val === 'wrong') breakdown[tier].w++;
                    if(val === 'unanswered') breakdown[tier].n++;
                }
            });
            return { total: score, breakdown: breakdown };
        }

        async function pushStateToCloud() {
            if(!activeTeam) return;
            const metrics = calculateMetricsTotal();

            const payload = {
                teamName: document.getElementById("teamNameInput").value.trim(),
                scorerName: document.getElementById("scorerNameInput").value.trim() || "N/A",
                totalScore: metrics.total,
                breakdown: metrics.breakdown,
                matrix: currentRecord
            };

            await fetch(`${DATABASE_URL}/competition_teams/${activeTeam}.json`, {
                method: "PUT",
                body: JSON.stringify(payload)
            });
        }

        function generateReportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const name = document.getElementById("teamNameInput").value.trim() || "Unspecified Profile Title";
            const scorer = document.getElementById("scorerNameInput").value.trim() || "N/A";
            const metrics = calculateMetricsTotal();

            // Minimalist Professional layout
            doc.setFont("times", "bold");
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.text("AUTOMATHIC 2027 INDIVIDUAL PERFORMANCE SUMMARY", 14, 20);
            
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.5);
            doc.line(14, 24, 196, 24);

            doc.setFont("times", "normal");
            doc.setFontSize(11);
            doc.text(`Registered Profile Title: ${name}`, 14, 34);
            doc.text(`Evaluation Officer: ${scorer}`, 14, 41);
            doc.text(`Total Final Grade Value: ${metrics.total} pts`, 14, 48);

            const tableHeaders = [["Sector Tier Category", "Evaluation Item Parameter", "Resolution State Status"]];
            const matrixRows = [];
            
            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const rawVal = currentRecord[tier][`item${i}`] || "unscored";
                    let stateDisplay = "NOT EVALUATED";
                    if(rawVal === "correct") stateDisplay = "PASSED / CORRECT";
                    if(rawVal === "wrong") stateDisplay = "FAILED / INCORRECT";
                    if(rawVal === "unanswered") stateDisplay = "OMITTED / NO ANSWER";
                    
                    matrixRows.push([tier.toUpperCase(), `Item 0${i}`, stateDisplay]);
                }
            });

            doc.autoTable({
                head: tableHeaders,
                body: matrixRows,
                startY: 56,
                theme: 'plain',
                headStyles: { textColor: [0, 0, 0], fontStyle: 'bold', fontFamily: 'times', fontSize: 11 },
                bodyStyles: { fontFamily: 'times', textColor: [0, 0, 0], fontSize: 10 },
                columnStyles: { 0: { fontStyle: 'bold', width: 50 }, 1: { width: 50 } },
                styles: { borderBottomWidth: 0.5, borderBottomColor: [180, 180, 180] }
            });

            doc.save(`Performance_Report_${name.replace(/\s+/g, '_')}.pdf`);
        }

        initMatrices();
    </script>
</body>
</html>
