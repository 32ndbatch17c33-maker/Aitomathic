<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMATHic 2027 Scoring Server App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        @keyframes subtleGlow {
            0% { text-shadow: 0 0 8px rgba(0, 255, 100, 0.3); }
            50% { text-shadow: 0 0 16px rgba(0, 255, 100, 0.6); }
            100% { text-shadow: 0 0 8px rgba(0, 255, 100, 0.3); }
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #0b0f12;
            color: #00ff64;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: linear-gradient(rgba(0, 255, 100, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 100, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .wrapper { width: 100%; max-width: 1100px; }
        
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #00ff64;
            padding-bottom: 20px;
            text-align: center;
        }
        
        h1 { 
            font-size: 24px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            animation: subtleGlow 4s infinite ease-in-out;
            color: #00ff64;
        }

        /* Celestial Space Backdrop Header Box */
        .server-cosmic-banner {
            width: 100%;
            height: 140px;
            background-color: #050709;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            border: 1px solid #00ff64;
            margin-bottom: 5px;
            position: relative;
        }

        .server-cosmic-banner::after {
            content: "CENTRAL ENGINE PULSE: ACTIVE";
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 11px;
            letter-spacing: 1px;
            background: #0b0f12;
            padding: 3px 8px;
            border: 1px solid #00ff64;
        }

        .btn-box { display: flex; gap: 10px; width: 100%; justify-content: flex-end; margin-top: 10px; }
        .btn {
            padding: 8px 18px; 
            font-family: "Times New Roman", Times, serif;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase;
            border: 1px solid #00ff64;
            background: transparent;
            color: #00ff64;
            transition: all 0.2s;
        }
        .pdf-btn { background-color: #00ff64; color: #000000; }
        .pdf-btn:hover { background: transparent; color: #00ff64; }
        .wipe-btn:hover { background: #ff3333; color: #ffffff; border-color: #ff3333; }
        
        .action-dl {
            background: transparent;
            border: 1px solid #00ff64;
            color: #00ff64;
            padding: 2px 8px;
            cursor: pointer;
            font-family: "Times New Roman", Times, serif;
        }
        .action-dl:hover { background: #00ff64; color: #000000; }

        table { width: 100%; border-collapse: collapse; background: #11161b; border: 1px solid #00ff64; }
        th, td { border: 1px solid rgba(0, 255, 100, 0.25); padding: 12px 14px; text-align: left; font-size: 14px; }
        th { background-color: #161f24; color: #00ff64; font-size: 12px; text-transform: uppercase; text-align: center; font-weight: bold; }
        tr:nth-child(even) { background-color: #141a21; }
        
        .txt-correct { color: #00ff64; font-weight: bold; }
        .txt-wrong { color: #ff3333; font-weight: bold; }
        .txt-none { color: #33a6ff; font-weight: bold; }
        
        .score-total { font-weight: bold; background-color: rgba(0, 255, 100, 0.05); text-align: center; }
        .empty { text-align: center; font-style: italic; padding: 40px; color: rgba(0, 255, 100, 0.5); }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-section">
            <h1>Welcome to AutoMATHic 2027 Scoring Server App<br><span style="font-size: 14px; opacity: 0.7;">Powered by APPerin</span></h1>
            
            <div class="server-cosmic-banner"></div>
            
            <div class="btn-box">
                <button class="btn pdf-btn" onclick="generateLeaderboardPDF()">Export Ledger Grid PDF</button>
                <button class="btn wipe-btn" onclick="wipeCloudData()">Reset System Server</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2" style="width: 6%;">Rank</th>
                    <th rowspan="2" style="width: 25%; text-align: left;">Registered Institutional Profile Title</th>
                    <th rowspan="2" style="width: 15%; text-align: left;">Assigned Scorer</th>
                    <th colspan="3">Easy Sector</th>
                    <th colspan="3">Average Sector</th>
                    <th colspan="3">Difficult Sector</th>
                    <th rowspan="2" style="width: 10%;">Total Mark</th>
                    <th rowspan="2" style="width: 10%;">Transcript</th>
                </tr>
                <tr>
                    <th>C</th><th>W</th><th>N</th>
                    <th>C</th><th>W</th><th>N</th>
                    <th>C</th><th>W</th><th>N</th>
                </tr>
            </thead>
            <tbody id="gridBody">
                <tr><td colspan="14" class="empty">Establishing automated polling tracking data channels...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const DATABASE_URL = "https://lomhji-default-rtdb.asia-southeast1.firebasedatabase.app";
        let globalCachedTeamsList = [];

        async function fetchCloudUpdates() {
            try {
                const response = await fetch(`${DATABASE_URL}/competition_teams.json`);
                const dataObject = await response.json();
                renderDashboard(dataObject);
            } catch (error) { console.error("Sync exception: ", error); }
        }

        function renderDashboard(dataObject) {
            const tbody = document.getElementById('gridBody');
            
            if (!dataObject || Object.keys(dataObject).length === 0) {
                globalCachedTeamsList = [];
                tbody.innerHTML = `<tr><td colspan="14" class="empty">No live profile modules actively tracked in server registries.</td></tr>`;
                return;
            }

            globalCachedTeamsList = Object.keys(dataObject).map(key => ({ ...dataObject[key] }));
            globalCachedTeamsList.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));

            tbody.innerHTML = globalCachedTeamsList.map((team, index) => `
                <tr>
                    <td style="text-align: center; font-weight: bold;">#${index + 1}</td>
                    <td style="font-weight: bold;">${team.teamName}</td>
                    <td>${team.scorerName || 'N/A'}</td>
                    
                    <td style="text-align: center;" class="txt-correct">${team.breakdown?.easy?.c ?? 0}</td>
                    <td style="text-align: center;" class="txt-wrong">${team.breakdown?.easy?.w ?? 0}</td>
                    <td style="text-align: center;" class="txt-none">${team.breakdown?.easy?.n ?? 0}</td>
                    
                    <td style="text-align: center;" class="txt-correct">${team.breakdown?.average?.c ?? 0}</td>
                    <td style="text-align: center;" class="txt-wrong">${team.breakdown?.average?.w ?? 0}</td>
                    <td style="text-align: center;" class="txt-none">${team.breakdown?.average?.n ?? 0}</td>
                    
                    <td style="text-align: center;" class="txt-correct">${team.breakdown?.difficult?.c ?? 0}</td>
                    <td style="text-align: center;" class="txt-wrong">${team.breakdown?.difficult?.w ?? 0}</td>
                    <td style="text-align: center;" class="txt-none">${team.breakdown?.difficult?.n ?? 0}</td>
                    
                    <td class="score-total">${team.totalScore || 0} pts</td>
                    <td style="text-align: center;"><button class="action-dl" onclick="downloadTeamPDF(${index})">Print</button></td>
                </tr>
            `).join('');
        }

        async function wipeCloudData() {
            if(confirm("Erase all remote server standings profiles permanently?")) {
                await fetch(`${DATABASE_URL}/competition_teams.json`, { method: 'DELETE' });
                fetchCloudUpdates();
            }
        }

        function downloadTeamPDF(index) {
            const team = globalCachedTeamsList[index];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFont("times", "bold");
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.text("AUTOMATHIC 2027 INDIVIDUAL PERFORMANCE SUMMARY", 14, 20);
            
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.5);
            doc.line(14, 24, 196, 24);

            doc.setFont("times", "normal");
            doc.setFontSize(11);
            doc.text(`Registered Profile Title: ${team.teamName}`, 14, 34);
            doc.text(`Evaluation Officer: ${team.scorerName || 'N/A'}`, 14, 41);
            doc.text(`Total Final Grade Value: ${team.totalScore || 0} pts`, 14, 48);

            const tableHeaders = [["Sector Tier Category", "Evaluation Item Parameter", "Resolution State Status"]];
            const matrixRows = [];
            
            ["easy", "average", "difficult"].forEach(tier => {
                for(let i = 1; i <= 5; i++) {
                    const rawVal = team.matrix?.[tier]?.[`item${i}`] || "unscored";
                    let stateDisplay = "NOT EVALUATED";
                    if(rawVal === "correct") stateDisplay = "PASSED / CORRECT";
                    if(rawVal === "wrong") stateDisplay = "FAILED / INCORRECT";
                    if(rawVal === "unanswered") stateDisplay = "OMITTED / NO ANSWER";
                    
                    matrixRows.push([tier.toUpperCase(), `Item 0${i}`, stateDisplay]);
                }
            });

            doc.autoTable({
                head: tableHeaders,
                body: matrixRows,
                startY: 56,
                theme: 'plain',
                headStyles: { textColor: [0, 0, 0], fontStyle: 'bold', fontFamily: 'times', fontSize: 11 },
                bodyStyles: { fontFamily: 'times', textColor: [0, 0, 0], fontSize: 10 },
                columnStyles: { 0: { fontStyle: 'bold', width: 50 }, 1: { width: 50 } },
                styles: { borderBottomWidth: 0.5, borderBottomColor: [180, 180, 180] }
            });

            doc.save(`Performance_Report_${team.teamName.replace(/\s+/g, '_')}.pdf`);
        }

        function generateLeaderboardPDF() {
            if(globalCachedTeamsList.length === 0) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFont("times", "bold");
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text("MASTER INSTITUTIONAL STANDINGS SCORE LEDGER [cite: 1]", 14, 20);
            
            const headers = [["Rank", "Institutional Title Profile [cite: 2]", "Evaluator Officer [cite: 2]", "Easy [cite: 2]", "Average [cite: 2]", "Difficult [cite: 2]", "Total Final Mark [cite: 2]"]];
            const bodyData = globalCachedTeamsList.map((team, idx) => [
                `#${idx + 1}`, team.teamName, team.scorerName || 'N/A',
                `${team.breakdown?.easy?.c ?? 0}/${team.breakdown?.easy?.w ?? 0}/${team.breakdown?.easy?.n ?? 0}`,
                `${team.breakdown?.average?.c ?? 0}/${team.breakdown?.average?.w ?? 0}/${team.breakdown?.average?.n ?? 0}`,
                `${team.breakdown?.difficult?.c ?? 0}/${team.breakdown?.difficult?.w ?? 0}/${team.breakdown?.difficult?.n ?? 0}`,
                `${team.totalScore || 0} pts`
            ]);

            doc.autoTable({
                head: headers,
                body: bodyData,
                startY: 26,
                theme: 'plain',
                headStyles: { textColor: [0, 0, 0], fontStyle: 'bold', fontFamily: 'times', fontSize: 10, cellPadding: 3 },
                bodyStyles: { fontFamily: 'times', textColor: [0, 0, 0], fontSize: 10, cellPadding: 4 },
                columnStyles: {
                    0: { width: 12, fontStyle: 'bold' },
                    1: { width: 75 },
                    2: { width: 30 },
                    3: { width: 18, halign: 'center' },
                    4: { width: 22, halign: 'center' },
                    5: { width: 22, halign: 'center' },
                    6: { width: 25, halign: 'right', fontStyle: 'bold' }
                },
                styles: { borderBottomWidth: 0.5, borderBottomColor: [200, 200, 200] }
            });

            doc.save("Master_Standings_Ledger.pdf");
        }

        fetchCloudUpdates();
        setInterval(fetchCloudUpdates, 1000);
    </script>
</body>
</html>
